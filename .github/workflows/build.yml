name: Build WCB Firmware

on:
  push:
    branches: [ '**' ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Arduino CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | BINDIR=/usr/local/bin sh
          arduino-cli version

      - name: Install ESP32 platform
        run: |
          arduino-cli core update-index \
            --additional-urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core install esp32:esp32@3.3.4 \
            --additional-urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json

      - name: Install libraries
        run: |
          arduino-cli lib install "EspSoftwareSerial@8.1.0"
          arduino-cli lib install "Adafruit NeoPixel@1.12.5"
          # HumanCyborgRelationsAPI (HCRVocalizer) is VENDORED in-repo at
          # Code/libraries/HumanCyborgRelationsAPI. We do NOT pull it from
          # upstream: the upstream library does not compile in the WCB build
          # (its I2C/TwoWire path), it has no released tags to pin to, and the
          # WCB needs a serial-only patched copy. Vendoring guarantees CI builds
          # the exact source validated locally, immune to upstream changes.
          mkdir -p "$HOME/Arduino/libraries"
          cp -r "$GITHUB_WORKSPACE/Code/libraries/HumanCyborgRelationsAPI" "$HOME/Arduino/libraries/"
          arduino-cli lib list

      - name: Run build script
        run: |
          chmod +x Code/bin/build.sh
          Code/bin/build.sh

      - name: Commit bin files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Code/bin/ Wizard/bin/
          git diff --staged --quiet || git commit -m "Auto-build: update firmware binaries [skip ci]"
          git push