name: Build WCB Firmware

on:
  push:
    branches: [ '**' ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Arduino CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | BINDIR=/usr/local/bin sh
          arduino-cli version

      - name: Install ESP32 platform
        run: |
          set -euo pipefail
          ESP32_URL=https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          # The esp32 core pulls ~1.3 GB of toolchains from GitHub's CDN (esp-rv32
          # alone is 568 MB). A single transient "connection reset by peer" on any
          # one of those downloads otherwise fails the whole build, so retry with
          # backoff. core install is idempotent — a re-run skips already-installed
          # tools and re-fetches only what's missing.
          retry() {
            local n=1 max=5
            while true; do
              "$@" && return 0
              if [ "$n" -ge "$max" ]; then echo "::error::'$*' failed after $max attempts"; return 1; fi
              echo "::warning::attempt $n/$max for '$*' failed — retrying in $((n*15))s…"
              sleep $((n*15)); n=$((n+1))
            done
          }
          retry arduino-cli core update-index --additional-urls "$ESP32_URL"
          retry arduino-cli core install esp32:esp32@3.3.4 --additional-urls "$ESP32_URL"

      - name: Install libraries
        run: |
          set -euo pipefail
          retry() {
            local n=1 max=5
            while true; do
              "$@" && return 0
              if [ "$n" -ge "$max" ]; then echo "::error::'$*' failed after $max attempts"; return 1; fi
              echo "::warning::attempt $n/$max for '$*' failed — retrying in $((n*10))s…"
              sleep $((n*10)); n=$((n+1))
            done
          }
          retry arduino-cli lib install "EspSoftwareSerial@8.1.0"
          retry arduino-cli lib install "Adafruit NeoPixel@1.12.5"
          # HumanCyborgRelationsAPI (HCRVocalizer) is NOT installed as a library.
          # The WCB-patched, serial-only copy is bundled directly inside the
          # sketch at Code/WCB/src/HumanCyborgRelationsAPI and pulled in with a
          # relative #include, so it compiles with no install step here — and can
          # never be shadowed by a different copy on the build machine.
          arduino-cli lib list

      # ─────────────────────────────────────────────────────────────────────
      # Auto-version — main branch only.
      #
      # Bumps the PATCH of the current semver and re-stamps the build time in
      # the established WCB format:  <semver>_<DDHHMM>R<MON><YEAR>  (US Eastern,
      # e.g. 6.1.1_241530RJUN2026). The new string is written into WCB.ino
      # BEFORE the build so the compiled firmware reports the same version that
      # gets tagged + released. Done only on main so feature branches don't
      # consume version numbers.
      #
      # The patch is bumped off whatever semver is in source. To start a new
      # minor/major line, edit the semver in WCB.ino to e.g. 6.2.0 and push —
      # the next release publishes 6.2.1 under the 6.2 line.
      # ─────────────────────────────────────────────────────────────────────
      - name: Auto-version (main only)
        if: github.ref == 'refs/heads/main'
        id: ver
        run: |
          set -euo pipefail
          INO=Code/WCB/WCB.ino
          CUR=$(grep 'String SoftwareVersion =' "$INO" | head -1 | grep -oE '"[^"]*"' | head -1 | tr -d '"')
          SEMVER="${CUR%%_*}"
          IFS=. read -r MAJOR MINOR PATCH _ <<< "$SEMVER"
          MAJOR=${MAJOR:-0}; MINOR=${MINOR:-0}; PATCH=${PATCH:-0}
          NEW_SEMVER="${MAJOR}.${MINOR}.$((PATCH + 1))"
          STAMP=$(TZ='America/New_York' date +'%d%H%MR%b%Y' | tr '[:lower:]' '[:upper:]')
          NEW_VER="${NEW_SEMVER}_${STAMP}"
          sed -i "s|String SoftwareVersion = \".*\";|String SoftwareVersion = \"${NEW_VER}\";|" "$INO"
          # Keep the decorative banner's "Version ..." line in sync too. Scoped to
          # the '*****' banner lines so the substitution can't touch anything else.
          sed -i "/\*\*\*\*\*/ s/\(Version \)[0-9][0-9.]*_[0-9]\{6\}R[A-Z]\{3\}[0-9]\{4\}/\1${NEW_VER}/" "$INO"
          echo "version=${NEW_VER}" >> "$GITHUB_OUTPUT"
          echo "tag=v${NEW_VER}"    >> "$GITHUB_OUTPUT"
          echo "Auto-version: ${CUR}  ->  ${NEW_VER}"

      - name: Run build script
        run: |
          chmod +x Code/bin/build.sh
          Code/bin/build.sh

      - name: Commit bin files
        env:
          NEWVER: ${{ steps.ver.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          MSG="Auto-build: update firmware binaries [skip ci]"
          [ -n "${NEWVER:-}" ] && MSG="Auto-release ${NEWVER} [skip ci]"
          git add Code/bin/ Wizard/bin/ Code/WCB/WCB.ino
          git diff --staged --quiet || git commit -m "$MSG"
          git push

      # ─────────────────────────────────────────────────────────────────────
      # Tag + publish Release — main branch only.
      #
      # Tags the commit just pushed (which carries the bumped version + bins)
      # and publishes a GitHub Release marked "Latest" with the built firmware
      # attached. The README/wiki shields badge (github/v/release) then shows
      # this version automatically. Guards make it a no-op if the tag/release
      # already exists (e.g. a manual re-run).
      # ─────────────────────────────────────────────────────────────────────
      - name: Tag & publish release (main only)
        if: github.ref == 'refs/heads/main' && steps.ver.outputs.tag != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.ver.outputs.tag }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            git tag "$TAG"
            git push origin "$TAG"
          fi
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --latest \
              --title "WCB Firmware ${VERSION}" \
              --generate-notes \
              Code/bin/WCB_${VERSION}_main_*.bin
          fi
